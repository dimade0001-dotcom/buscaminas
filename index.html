    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración inicial
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'danger-mines-default';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // State Global
        const state = {
            profile: null,
            globalHistory: [],
            // ...
        };

        // Autenticación inicial
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined') {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                // Suscripción a eventos en tiempo real
                const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                onSnapshot(logsRef, (snapshot) => {
                    const logs = [];
                    snapshot.forEach((doc) => logs.push(doc.data()));
                    // Ordenar en memoria (Regla 2: Sin consultas complejas)
                    logs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    state.globalHistory = logs.slice(0, 20);
                    updateLiveFeedUI();
                }, (err) => console.error("Error en feed:", err));

            } catch (e) {
                console.error("Auth failed", e);
            }
        };

        const logToGlobal = async (eventData) => {
            if (!auth.currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    ...eventData,
                    timestamp: Date.now()
                });
            } catch (e) {
                console.error("Error escribiendo log:", e);
            }
        };

        const updateLiveFeedUI = () => {
            const container = document.getElementById('live-feed-container');
            if (!container) return;
            container.innerHTML = state.globalHistory.map(log => `
                <div class="text-[10px] border-b border-white/5 py-1 flex justify-between">
                    <span class="text-blue-400 font-mono">${log.username}</span>
                    <span class="text-gray-400">${log.event}</span>
                </div>
            `).join('');
        };
