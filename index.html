<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        select, input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: #333;
        }

        .difficulty-btn:hover {
            border-color: #667eea;
            background: #f0f0f0;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-box p {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-box span {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ff5252;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            display: inline-grid;
            gap: 2px;
            padding: 10px;
            background: #ddd;
            border-radius: 8px;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            background: #e0e0e0;
            transition: all 0.2s;
            user-select: none;
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .cell.revealed {
            background: #f5f5f5;
            cursor: default;
            color: #333;
        }

        .cell.mine {
            background: #ff6b6b;
            color: white;
            font-size: 1.3em;
        }

        .cell.flagged {
            background: #ffd93d;
            color: #333;
            font-size: 1.2em;
        }

        .cell.empty {
            color: transparent;
        }

        .cell.one { color: #0066cc; }
        .cell.two { color: #009900; }
        .cell.three { color: #ff0000; }
        .cell.four { color: #000066; }
        .cell.five { color: #990000; }
        .cell.six { color: #009999; }
        .cell.seven { color: #000000; }
        .cell.eight { color: #666666; }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            min-height: 30px;
        }

        .message.win {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .message.lose {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .leaderboard {
            background: #f9f9f9;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .leaderboard h3 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.95em;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #667eea;
            min-width: 30px;
        }

        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }

        .time {
            color: #666;
            font-weight: bold;
        }

        .difficulty-label {
            font-size: 0.85em;
            color: #999;
            margin-top: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .cell {
                width: 35px;
                height: 35px;
                font-size: 0.9em;
            }

            .difficulty-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 Buscaminas</h1>
        <p class="subtitle">¡Encuentra todas las minas sin pisar ninguna!</p>

        <div class="controls">
            <div class="control-group">
                <label for="rows">Filas:</label>
                <input type="number" id="rows" min="5" max="20" value="10">
            </div>
            <div class="control-group">
                <label for="cols">Columnas:</label>
                <input type="number" id="cols" min="5" max="20" value="10">
            </div>
            <div class="control-group">
                <label for="mines">Minas:</label>
                <input type="number" id="mines" min="1" max="300" value="10">
            </div>
            <div class="control-group">
                <label for="playerName">Tu nombre:</label>
                <input type="text" id="playerName" placeholder="Ingresa tu nombre">
            </div>
        </div>

        <div class="difficulty-buttons">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">🟢 Fácil</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">🟡 Medio</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">🔴 Difícil</button>
        </div>

        <div class="game-info">
            <div class="info-box">
                <p>Minas restantes</p>
                <span id="minesLeft">0</span>
            </div>
            <div class="info-box">
                <p>Tiempo</p>
                <span id="timer">0:00</span>
            </div>
            <div class="info-box">
                <p>Celdas reveladas</p>
                <span id="revealed">0</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-start" onclick="startGame()">🎮 Nuevo Juego</button>
            <button class="btn-reset" onclick="resetScores()">🗑️ Limpiar marcadores</button>
        </div>

        <div id="message" class="message"></div>

        <div class="board-container">
            <div id="board" class="board"></div>
        </div>

        <div class="leaderboard">
            <h3>🏆 Top 10 Mejores Puntuaciones</h3>
            <ul class="leaderboard-list" id="leaderboardList">
                <li class="leaderboard-item">
                    <span>No hay puntuaciones aún</span>
                </li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
