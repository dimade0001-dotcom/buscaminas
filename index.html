<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💀 Buscaminas - Juego de Minas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d0000 100%);
            color: #fff;
        }

        .container {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1a1a 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.8);
            padding: 30px;
            max-width: 650px;
            width: 90%;
            border: 3px solid #8b0000;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .skull-logo {
            font-size: 4em;
            margin-bottom: 10px;
            display: block;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
        }

        h1 {
            text-align: center;
            color: #ff4444;
            margin-bottom: 5px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .subtitle {
            text-align: center;
            color: #cc6666;
            margin-bottom: 25px;
            font-size: 1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #ff6666;
            margin-bottom: 5px;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        select, input {
            padding: 10px;
            border: 2px solid #8b0000;
            border-radius: 8px;
            font-size: 0.95em;
            background: #2a2a2a;
            color: #fff;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            background: #333;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-btn {
            padding: 12px;
            border: 2px solid #8b0000;
            background: #2a2a2a;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: #ff6666;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .difficulty-btn:hover {
            border-color: #ff4444;
            background: #3a2a2a;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .difficulty-btn.active {
            background: #8b0000;
            color: #ffcccc;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box {
            background: #2a1a1a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ff4444;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .info-box p {
            font-size: 0.85em;
            color: #ff6666;
            margin-bottom: 5px;
        }

        .info-box span {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #8b0000 0%, #ff4444 100%);
            color: white;
            grid-column: span 2;
            border: 2px solid #ff4444;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.5);
        }

        .btn-reset {
            background: #8b0000;
            color: #ffcccc;
            border: 2px solid #ff4444;
        }

        .btn-reset:hover {
            background: #ff4444;
            color: #000;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            display: inline-grid;
            gap: 2px;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            border: 3px solid #8b0000;
        }

        .cell {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            background: #3a3a3a;
            transition: all 0.2s;
            user-select: none;
            border: 1px solid #555;
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: #4a4a4a;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
        }

        .cell.revealed {
            background: #2a2a2a;
            cursor: default;
            color: #fff;
            border: 1px solid #444;
        }

        .cell.mine {
            background: linear-gradient(135deg, #ff4444 0%, #8b0000 100%);
            color: #fff;
            font-size: 1.3em;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .cell.flagged {
            background: #cc6600;
            color: #fff;
            font-size: 1.2em;
            border: 1px solid #ff8800;
        }

        .cell.empty {
            color: transparent;
        }

        .cell.one { color: #4488ff; }
        .cell.two { color: #44ff44; }
        .cell.three { color: #ff4444; }
        .cell.four { color: #4444ff; }
        .cell.five { color: #ff4444; }
        .cell.six { color: #44ffff; }
        .cell.seven { color: #ffff44; }
        .cell.eight { color: #ff8844; }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            min-height: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .message.win {
            background: #1a3a1a;
            color: #44ff44;
            border: 2px solid #44ff44;
            box-shadow: 0 0 20px rgba(68, 255, 68, 0.3);
        }

        .message.lose {
            background: #3a1a1a;
            color: #ff4444;
            border: 2px solid #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }

        .leaderboard {
            background: #1a1a1a;
            border: 2px solid #8b0000;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .leaderboard h3 {
            color: #ff4444;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #3a2a2a;
            font-size: 0.95em;
            color: #cc6666;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            color: #ff6666;
            min-width: 30px;
        }

        .rank.gold { color: #ffcc44; text-shadow: 0 0 10px rgba(255, 204, 68, 0.5); }
        .rank.silver { color: #cccccc; text-shadow: 0 0 10px rgba(204, 204, 204, 0.5); }
        .rank.bronze { color: #ff8844; text-shadow: 0 0 10px rgba(255, 136, 68, 0.5); }

        .time {
            color: #ff6666;
            font-weight: bold;
        }

        .difficulty-label {
            font-size: 0.85em;
            color: #999;
            margin-top: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .skull-logo {
                font-size: 3em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .cell {
                width: 35px;
                height: 35px;
                font-size: 0.9em;
            }

            .difficulty-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="skull-logo">💀</span>
            <h1>BUSCAMINAS</h1>
            <p class="subtitle">¡Encuentra todas las minas sin pisar ninguna!</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="rows">Filas:</label>
                <input type="number" id="rows" min="5" max="20" value="10">
            </div>
            <div class="control-group">
                <label for="cols">Columnas:</label>
                <input type="number" id="cols" min="5" max="20" value="10">
            </div>
            <div class="control-group">
                <label for="mines">Minas:</label>
                <input type="number" id="mines" min="1" max="300" value="10">
            </div>
            <div class="control-group">
                <label for="playerName">Tu nombre:</label>
                <input type="text" id="playerName" placeholder="Ingresa tu nombre">
            </div>
        </div>

        <div class="difficulty-buttons">
            <button class="difficulty-btn" onclick="setDifficulty('easy')">🟢 Fácil</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">🟡 Medio</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">🔴 Difícil</button>
        </div>

        <div class="game-info">
            <div class="info-box">
                <p>Minas restantes</p>
                <span id="minesLeft">0</span>
            </div>
            <div class="info-box">
                <p>Tiempo</p>
                <span id="timer">0:00</span>
            </div>
            <div class="info-box">
                <p>Celdas reveladas</p>
                <span id="revealed">0</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-start" onclick="startGame()">🎮 Nuevo Juego</button>
            <button class="btn-reset" onclick="resetScores()">🗑️ Limpiar</button>
        </div>

        <div id="message" class="message"></div>

        <div class="board-container">
            <div id="board" class="board"></div>
        </div>

        <div class="leaderboard">
            <h3>💀 Top 10 Mejores Puntuaciones</h3>
            <ul class="leaderboard-list" id="leaderboardList">
                <li class="leaderboard-item">
                    <span>No hay puntuaciones aún</span>
                </li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
