<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danger Mines - Global Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
        input { font-size: 16px !important; }
        @keyframes tactical-pulse { 0%, 100% { box-shadow: 0 0 10px rgba(220, 38, 38, 0.2); } 50% { box-shadow: 0 0 25px rgba(220, 38, 38, 0.6); } }
        .tactical-glow { animation: tactical-pulse 2s infinite; }
        .cell { transition: all 0.15s ease-in-out; }
        .cell.revealed { background-color: #171717; border-color: #262626; box-shadow: inset 0 0 6px rgba(0,0,0,0.6); }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 font-sans min-h-screen flex flex-col">

    <div id="notification-container" class="fixed top-16 left-1/2 transform -translate-x-1/2 z-[100] hidden">
        <div id="notification-msg" class="bg-white text-black px-5 py-2.5 rounded-full font-black text-[10px] animate-bounce tracking-widest text-center uppercase whitespace-nowrap"></div>
    </div>

    <div id="loading-screen" class="min-h-screen bg-neutral-950 flex flex-col justify-center items-center text-red-600 gap-4 fixed inset-0 z-50">
        <i data-lucide="bomb" class="w-16 h-16 animate-pulse"></i>
        <span class="font-mono text-xs tracking-widest uppercase">Sincronizando con Servidor Global...</span>
    </div>

    <div id="auth-screen" class="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-4 hidden">
        <div class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-3xl p-8 shadow-2xl relative">
            <h1 class="text-4xl font-black italic text-center text-white mb-8">DANGER <span class="text-red-600">MINES</span></h1>
            <form id="auth-form" class="space-y-4">
                <input type="text" id="auth-username" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl py-3 px-4 text-white font-bold" placeholder="Tu Nombre de Agente" required />
                <input type="password" id="auth-password" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl py-3 px-4 text-white font-bold" placeholder="Código de Seguridad" required />
                <button type="submit" class="w-full bg-red-600 py-4 rounded-xl font-black text-white hover:bg-red-500 transition-all">ACCEDER A LA RED GLOBAL</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col min-h-screen w-full">
        <header class="bg-neutral-950 border-b border-neutral-900 p-4 flex justify-between items-center">
            <div>
                <h1 class="font-black text-white italic">DANGER <span class="text-red-600">MINES</span></h1>
                <span class="text-[10px] text-neutral-500 font-bold uppercase">Agente: <span id="header-username">---</span></span>
            </div>
            <div class="text-yellow-500 font-black text-sm" id="header-balance">0 PTS</div>
        </header>
        
        <main class="flex-1 p-4 flex flex-col items-center">
            <div id="tab-game" class="w-full max-w-lg">
                <div id="mines-grid" class="grid gap-1 bg-neutral-900 p-2 rounded-xl"></div>
                <button id="btn-start-game" class="mt-4 w-full bg-red-600 py-3 rounded-xl font-black">INICIAR OPERACIÓN</button>
            </div>
            <div id="tab-ranking" class="hidden w-full max-w-lg">
                <div id="ranking-container" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-neutral-950 border-t border-neutral-900 flex justify-around p-4">
            <button data-tab="game" class="nav-btn text-red-500"><i data-lucide="target"></i></button>
            <button data-tab="ranking" class="nav-btn text-neutral-600"><i data-lucide="crown"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyArsLcBp2WUKk7WiAYh2I7tTvdAzcs1My0",
            authDomain: "danger-mines.firebaseapp.com",
            projectId: "danger-mines",
            storageBucket: "danger-mines.firebasestorage.app",
            messagingSenderId: "722493966122",
            appId: "1:722493966122:web:283963d471c46300cd8053"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'danger-mines-global-elite';

        // Globals
        let currentUser = null;
        let users = [];

        // UI Helpers
        lucide.createIcons();
        const getPublicRef = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

        const setupListeners = async () => {
            await signInAnonymously(auth);
            
            // Listen to users globally
            onSnapshot(getPublicRef('users'), (snap) => {
                users = [];
                snap.forEach(d => users.push(d.data()));
                renderRanking();
            });
        };

        const renderRanking = () => {
            const container = document.getElementById('ranking-container');
            container.innerHTML = users.sort((a,b) => b.balance - a.balance).map((u, i) => `
                <div class="flex justify-between p-3 bg-neutral-900 rounded-lg">
                    <span>#${i+1} ${u.username}</span>
                    <span class="text-yellow-500 font-bold">${u.balance} PTS</span>
                </div>
            `).join('');
        };

        // Authentication
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('auth-username').value;
            currentUser = { username, balance: 0, level: 1, lastActive: Date.now() };
            
            await setDoc(doc(getPublicRef('users'), username.toLowerCase()), currentUser);
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('header-username').innerText = username;
        };

        // Navigation
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.onclick = () => {
                document.getElementById('tab-game').classList.toggle('hidden', b.dataset.tab !== 'game');
                document.getElementById('tab-ranking').classList.toggle('hidden', b.dataset.tab !== 'ranking');
            };
        });

        // Game Init
        setupListeners().then(() => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
        });

        // Simple Mine Grid Init
        const grid = document.getElementById('mines-grid');
        grid.style.gridTemplateColumns = 'repeat(10, minmax(0, 1fr))';
        for(let i=0; i<100; i++) {
            const cell = document.createElement('div');
            cell.className = "cell w-8 h-8 bg-neutral-800 rounded";
            cell.onclick = () => {
                cell.classList.add('revealed');
                if(currentUser) {
                    currentUser.balance += 10;
                    setDoc(doc(getPublicRef('users'), currentUser.username.toLowerCase()), currentUser);
                    document.getElementById('header-balance').innerText = `${currentUser.balance} PTS`;
                }
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
